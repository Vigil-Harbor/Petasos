<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" width="160" height="200">
  <defs>
    <linearGradient id="shield-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="shield-stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#a06e08"/>
    </linearGradient>
    <linearGradient id="s-cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="40%" stop-color="#e8a820"/>
      <stop offset="100%" stop-color="#c48a10"/>
    </linearGradient>
    <linearGradient id="s-shine" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#fff566" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s-brim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4960e"/>
      <stop offset="100%" stop-color="#a06e08"/>
    </linearGradient>
    <linearGradient id="s-wing" x1="0" y1="1" x2="0.2" y2="0">
      <stop offset="0%" stop-color="#c0c0c0"/>
      <stop offset="40%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="s-text" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#c48a10"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M 80,8 L 148,32 L 148,100 Q 148,160 80,192 Q 12,160 12,100 L 12,32 Z"
        fill="url(#shield-fill)" stroke="url(#shield-stroke)" stroke-width="3"/>
  <!-- Inner shield border -->
  <path d="M 80,18 L 140,38 L 140,98 Q 140,152 80,182 Q 20,152 20,98 L 20,38 Z"
        fill="none" stroke="#e8a820" stroke-width="0.8" opacity="0.3"/>

  <!-- Helmet group centered in shield -->
  <g transform="translate(80, 78) scale(0.52)">

    <!-- Left wing -->
    <g transform="translate(-12, 8)">
      <path d="M -8,-10 Q -30,-38 -62,-62 Q -68,-56 -42,-32 Z" fill="url(#s-wing)" stroke="#999" stroke-width="1"/>
      <path d="M -10,-8 Q -36,-40 -72,-68 Q -78,-60 -48,-34 Z" fill="url(#s-wing)" stroke="#999" stroke-width="1"/>
      <path d="M -10,-4 Q -40,-38 -78,-60 Q -82,-52 -50,-28 Z" fill="url(#s-wing)" stroke="#999" stroke-width="1"/>
      <path d="M -8,0 Q -38,-30 -70,-48 Q -72,-40 -44,-20 Z" fill="url(#s-wing)" stroke="#aaa" stroke-width="0.8"/>
      <path d="M -6,4 Q -32,-20 -58,-36 Q -60,-28 -36,-12 Z" fill="url(#s-wing)" stroke="#aaa" stroke-width="0.8"/>
      <path d="M -4,8 Q -26,-12 -48,-24 Q -48,-16 -28,-4 Z" fill="url(#s-wing)" stroke="#aaa" stroke-width="0.8"/>
      <path d="M -2,10 Q -18,-2 -36,-12 Q -34,-6 -18,4 Z" fill="url(#s-wing)" stroke="#bbb" stroke-width="0.6"/>
      <path d="M 0,12 Q -12,2 -26,-4 Q -24,0 -12,8 Z" fill="url(#s-wing)" stroke="#bbb" stroke-width="0.6"/>
      <ellipse cx="-4" cy="6" rx="10" ry="14" fill="#ddd" stroke="#aaa" stroke-width="1"/>
      <ellipse cx="-2" cy="6" rx="6" ry="10" fill="#eee" stroke="#bbb" stroke-width="0.6"/>
    </g>

    <!-- Right wing -->
    <g transform="translate(12, 8) scale(-1,1)">
      <path d="M -8,-10 Q -30,-38 -62,-62 Q -68,-56 -42,-32 Z" fill="url(#s-wing)" stroke="#999" stroke-width="1"/>
      <path d="M -10,-8 Q -36,-40 -72,-68 Q -78,-60 -48,-34 Z" fill="url(#s-wing)" stroke="#999" stroke-width="1"/>
      <path d="M -10,-4 Q -40,-38 -78,-60 Q -82,-52 -50,-28 Z" fill="url(#s-wing)" stroke="#999" stroke-width="1"/>
      <path d="M -8,0 Q -38,-30 -70,-48 Q -72,-40 -44,-20 Z" fill="url(#s-wing)" stroke="#aaa" stroke-width="0.8"/>
      <path d="M -6,4 Q -32,-20 -58,-36 Q -60,-28 -36,-12 Z" fill="url(#s-wing)" stroke="#aaa" stroke-width="0.8"/>
      <path d="M -4,8 Q -26,-12 -48,-24 Q -48,-16 -28,-4 Z" fill="url(#s-wing)" stroke="#aaa" stroke-width="0.8"/>
      <path d="M -2,10 Q -18,-2 -36,-12 Q -34,-6 -18,4 Z" fill="url(#s-wing)" stroke="#bbb" stroke-width="0.6"/>
      <path d="M 0,12 Q -12,2 -26,-4 Q -24,0 -12,8 Z" fill="url(#s-wing)" stroke="#bbb" stroke-width="0.6"/>
      <ellipse cx="-4" cy="6" rx="10" ry="14" fill="#ddd" stroke="#aaa" stroke-width="1"/>
      <ellipse cx="-2" cy="6" rx="6" ry="10" fill="#eee" stroke="#bbb" stroke-width="0.6"/>
    </g>

    <!-- Cap body -->
    <path d="M -50,12 Q -52,-8 -40,-24 Q -24,-40 0,-44 Q 24,-40 40,-24 Q 52,-8 50,12 Z"
          fill="url(#s-cap)" stroke="#a06e08" stroke-width="2"/>

    <!-- Shine -->
    <path d="M -20,-10 Q -10,-34 10,-34 Q 26,-30 30,-14 Q 16,-24 0,-26 Q -14,-24 -20,-10 Z"
          fill="url(#s-shine)"/>

    <!-- Vertical bars -->
    <path d="M 0,-44 L 0,12" fill="none" stroke="#b8880e" stroke-width="1.5" opacity="0.4"/>
    <path d="M -16,-38 L -16,12" fill="none" stroke="#b8880e" stroke-width="1" opacity="0.3"/>
    <path d="M 16,-38 L 16,12" fill="none" stroke="#b8880e" stroke-width="1" opacity="0.3"/>
    <path d="M -32,-28 L -34,12" fill="none" stroke="#b8880e" stroke-width="1" opacity="0.2"/>
    <path d="M 32,-28 L 34,12" fill="none" stroke="#b8880e" stroke-width="1" opacity="0.2"/>

    <!-- Brim -->
    <path d="M -62,12 Q -60,6 -50,12 L 50,12 Q 60,6 62,12 Q 62,22 50,24 Q 20,28 0,28 Q -20,28 -50,24 Q -62,22 -62,12 Z"
          fill="url(#s-brim)" stroke="#a06e08" stroke-width="1.5"/>
    <path d="M -58,14 Q 0,10 58,14" fill="none" stroke="#f5c842" stroke-width="1" opacity="0.5"/>

    <!-- Rivets -->
    <circle cx="-40" cy="18" r="2.5" fill="#d4960e" stroke="#a06e08" stroke-width="0.8"/>
    <circle cx="-40" cy="18" r="1" fill="#f5c842" opacity="0.6"/>
    <circle cx="-20" cy="20" r="2.5" fill="#d4960e" stroke="#a06e08" stroke-width="0.8"/>
    <circle cx="-20" cy="20" r="1" fill="#f5c842" opacity="0.6"/>
    <circle cx="0" cy="21" r="2.5" fill="#d4960e" stroke="#a06e08" stroke-width="0.8"/>
    <circle cx="0" cy="21" r="1" fill="#f5c842" opacity="0.6"/>
    <circle cx="20" cy="20" r="2.5" fill="#d4960e" stroke="#a06e08" stroke-width="0.8"/>
    <circle cx="20" cy="20" r="1" fill="#f5c842" opacity="0.6"/>
    <circle cx="40" cy="18" r="2.5" fill="#d4960e" stroke="#a06e08" stroke-width="0.8"/>
    <circle cx="40" cy="18" r="1" fill="#f5c842" opacity="0.6"/>
  </g>

  <!-- PETASOS text -->
  <text x="80" y="148" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="url(#s-text)" letter-spacing="5" font-weight="bold">PETASOS</text>

  <!-- Divider -->
  <line x1="40" y1="155" x2="120" y2="155" stroke="#e8a820" stroke-width="0.6" opacity="0.5"/>

  <!-- Security text -->
  <text x="80" y="168" text-anchor="middle" font-family="'Segoe UI', Helvetica, sans-serif" font-size="9" fill="#8a8a8a" letter-spacing="3">SECURITY</text>
</svg>
